<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="16" cy="16" r="14" fill="url(#bgGradient)" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Blog document icon -->
  <g transform="translate(8, 8)">
    <!-- Document lines -->
    <rect x="2" y="3" width="12" height="14" rx="1" fill="white" opacity="0.9"/>
    <line x1="4" y1="6" x2="12" y2="6" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="9" x2="12" y2="9" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="12" x2="12" y2="12" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Small highlight dot -->
  <circle cx="24" cy="8" r="2" fill="#10B981"/>
</svg>
